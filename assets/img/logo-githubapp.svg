    fill="none"
    stroke="url(#stroke)"
    stroke-width="4"
    stroke-linejoin="round"
  />

  <!-- Circuit / tête de bot -->
  <circle cx="90" cy="95" r="10" fill="#00e0ff"/>
  <circle cx="130" cy="95" r="10" fill="#00e0ff"/>

  <rect x="82" y="120" width="56" height="6" rx="3" fill="#00e0ff" opacity="0.8"/>

  <path d="M70 80 L60 70" stroke="#00e0ff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="58" cy="68" r="3" fill="#00e0ff"/>

  <path d="M150 80 L160 70" stroke="#00e0ff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="162" cy="68" r="3" fill="#00e0ff"/>

  <!-- Label text -->
  <text x="110" y="195" text-anchor="middle" fill="#9aa0c2"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
