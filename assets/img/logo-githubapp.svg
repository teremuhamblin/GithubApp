<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#00e0ff" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#050814" stop-opacity="1"/>
      <stop offset="100%" stop-color="#020309" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e0ff"/>
      <stop offset="100%" stop-color="#7af2ff"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="220" height="220" fill="url(#bg)"/>

  <!-- Hexagone -->
  <polygon
