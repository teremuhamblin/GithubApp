name: Auto Badge Booster

on:
  push:
  pull_request:
  issues:
  schedule:
    - cron: "0 */6 * * *"   # toutes les 6 heures
  workflow_dispatch:

jobs:
  auto-actions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Auto commit (débloque badge Actions)
        run: |
          echo "Run: $(date)" >> auto-log.txt
          git config user.name "Badge Booster Bot"
          git config user.email "bot@example.com"
          git add .
          git commit -m "Auto commit pour badges" || echo "Aucun changement à commit"

      - name: Push
        run: git push || echo "Rien à pousser"

      - name: Créer une issue automatique (débloque Quickdraw)
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues \
            -d '{"title":"Issue automatique","body":"Issue générée pour débloquer des badges."}'

      - name: Créer une PR automatique (débloque Pull Shark)
        run: |
          BRANCH="badge-branch-$(date +%s)"
          git checkout -b $BRANCH
          echo "PR auto" >> pr-file.txt
          git add .
          git commit -m "PR automatique"
          git push origin $BRANCH
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d "{\"title\":\"PR automatique\",\"head\":\"$BRANCH\",\"base\":\"main\"}"
